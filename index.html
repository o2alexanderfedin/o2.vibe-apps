<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marketplace</title>
    <!-- Content Security Policy: restricts origins for security containment.
         connect-src locks outbound fetch to this origin and the platform API endpoint only.
         script-src includes unsafe-eval reserved for the runtime compile path arriving in a later phase. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.anthropic.com; img-src 'self' data:; font-src 'self';"
    />
    <script>
      (function () {
        var stored = localStorage.getItem('marketplace.theme');
        var theme = stored === 'light' || stored === 'dark' ? stored
          : window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
